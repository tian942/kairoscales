  <body>
    <!-- GitHub Pages SPA routing: decode redirect from 404.html -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= query param from 404.html
        var search = window.location.search;
        if (search) {
          var p = search.slice(1).split('&').reduce(function(o, s) {
            var kv = s.split('=');
            o[decodeURIComponent(kv[0])] = kv.slice(1).join('=').replace(/~and~/g, '&');
            return o;
          }, {});
          if (p.p !== undefined) {
            window.history.replaceState(
              null, null,
              p.p + (p.q ? '?' + p.q : '') + (window.location.hash || '')
            );
          }
        }
      })();
    </script>
