<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kairo Marketing</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the path into a query string so the main index.html can decode it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
